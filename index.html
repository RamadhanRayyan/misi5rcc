<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Imsak</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-b from-emerald-900 to-emerald-700 min-h-screen flex flex-col">

<header class="text-center py-6 text-white">
<h1 class="text-3xl font-bold">🌙 Jadwal Imsakiyah</h1>
<p class="text-sm opacity-80">Cari kota untuk melihat jadwal sholat</p>
</header>


<main class="flex-1 container mx-auto px-4 pb-10">

<section class="bg-white rounded-xl shadow-xl p-6 max-w-4xl mx-auto">

<!-- Search -->
<div class="mb-6 relative">

<label class="font-semibold text-gray-700">
Cari Kota
</label>

<input
id="searchKota"
type="text"
placeholder="Ketik nama kota..."
class="w-full mt-2 p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500"
/>

<ul
id="kotaList"
class="absolute w-full bg-white border rounded-lg mt-1 max-h-60 overflow-y-auto hidden z-10">
</ul>

</div>


<!-- loadinga -->
<p id="loading" class="text-center text-gray-500 hidden mb-4">
Memuat jadwal...
</p>

<!-- jika eror -->
<p id="error" class="text-center text-red-500 hidden mb-4">
Gagal memuat data
</p>


<!-- table -->
<div class="overflow-x-auto">

<table class="w-full text-center border rounded-lg overflow-hidden text-sm md:text-base">

<thead class="bg-emerald-600 text-white">

<tr>
<th class="p-3">Tanggal</th>
<th class="p-3">Imsak</th>
<th class="p-3">Subuh</th>
<th class="p-3">Dzuhur</th>
<th class="p-3">Ashar</th>
<th class="p-3">Maghrib</th>
<th class="p-3">Isya</th>
</tr>

</thead>

<tbody id="jadwalBody" class="divide-y">

<tr>
<td colspan="7" class="p-6 text-gray-400">
Cari kota untuk melihat jadwal
</td>
</tr>

</tbody>

</table>

</div>

</section>

</main>


<footer class="text-center text-white text-sm py-4 opacity-80">
Build it with iman 🤲 and love 💖. By RamadhanRayyan
</footer>

<script src="script.js"></script>

</body>
</html>
